# Build + publish the Teal container image to GitHub Container Registry.
#
# Triggers:
#   - push to main:    builds + pushes :latest (and :sha-<short>)
#   - push of v* tag:  also pushes :vX.Y.Z and :vX.Y
#   - manual dispatch: rebuilds :latest
#
# After the very first run, the GHCR package is created as PRIVATE by
# default. Flip it to public once at:
#   https://github.com/users/sariakos/packages/container/teal/settings
# (Danger zone → "Change visibility" → Public).
# After that, install.sh on a fresh server can pull anonymously and
# `curl … | bash` is a one-liner end-to-end.

name: release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Image lives at ghcr.io/<owner>/teal regardless of repo case.
          images: ghcr.io/${{ github.repository_owner }}/teal
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Pull the version into the binary so /healthz can report it.
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
