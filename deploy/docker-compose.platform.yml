# Production compose for the Teal platform itself. The installer copies
# this file to /etc/teal/docker-compose.yml on the host and starts it
# via `docker compose up -d`.
#
# Two services:
#   - teal       the Go binary (HTTP + WS API + embedded SPA)
#   - traefik    the reverse proxy that fronts both Teal and user apps
#
# Persistent state lives under TEAL_DATA_DIR on the host, which the
# installer points at /var/lib/teal by default. The user app workdirs,
# the SQLite DB, the per-container log buffer, and the Traefik static
# config + ACME state all bind-mount from that one directory so a
# single backup target captures everything.
#
# Networking:
#   - platform_proxy is the Docker network user app containers attach
#     to; Traefik routes by Host rule. The Teal binary creates this
#     network at boot (NetworkCreateIfMissing) — declared external here
#     so compose doesn't try to delete it on `down`.
#
# Secrets:
#   - TEAL_PLATFORM_SECRET is generated by the installer and stored in
#     /etc/teal/.env (mode 0600). Never commit this file.

services:
  teal:
    image: ghcr.io/sariakos/teal:latest
    container_name: teal
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      TEAL_ENV: prod
      TEAL_HTTP_ADDR: ":3000"
      TEAL_DB_PATH: /var/lib/teal/teal.db
      TEAL_WORKDIR_ROOT: /var/lib/teal
      TEAL_TRAEFIK_DYNAMIC_DIR: /var/lib/teal/traefik/dynamic
      TEAL_TRAEFIK_STATIC_PATH: /var/lib/teal/traefik/traefik.yml
      TEAL_CONTAINER_LOGS_DIR: /var/lib/teal/container-logs
    volumes:
      - /var/lib/teal:/var/lib/teal
      # Mount the docker socket so Teal can drive `docker compose` for
      # user apps. This is the obvious capability boundary — anything
      # that can talk to docker.sock can do anything to containers on
      # this host. Teal's auth + audit are the gate.
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - platform_proxy
    labels:
      # Route the Teal UI itself through Traefik.
      - "traefik.enable=true"
      - "traefik.http.routers.teal.rule=Host(`${TEAL_BASE_DOMAIN:-teal.localhost}`)"
      - "traefik.http.routers.teal.entrypoints=web"
      - "traefik.http.services.teal.loadbalancer.server.port=3000"

  traefik:
    image: traefik:v3.5
    container_name: teal-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/lib/teal/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - /var/lib/teal/traefik/dynamic:/etc/traefik/dynamic:ro
      - /var/lib/teal/traefik/acme:/etc/traefik/acme
    networks:
      - platform_proxy
    depends_on:
      - teal

networks:
  platform_proxy:
    name: platform_proxy
    external: true
