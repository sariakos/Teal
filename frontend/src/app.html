<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="color-scheme" content="light dark" />
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		<title>Teal</title>
		<script>
			// Resolve the active theme before first paint to avoid a
			// light-on-dark flash. Mirrors the logic in lib/stores/theme.svelte.ts.
			(function () {
				try {
					var stored = localStorage.getItem('teal:theme');
					var prefersDark =
						window.matchMedia &&
						window.matchMedia('(prefers-color-scheme: dark)').matches;
					var theme =
						stored === 'light' || stored === 'dark'
							? stored
							: prefersDark
								? 'dark'
								: 'light';
					document.documentElement.setAttribute('data-theme', theme);
				} catch (_) {
					/* localStorage unavailable; default light */
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
