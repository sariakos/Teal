<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Teal favicon / icon mark -->
  <!-- Background -->
  <rect width="100" height="100" rx="14" fill="#0D9488"/>
  <!-- Deploying stack bar (lighter teal = incoming deployment) -->
  <rect x="18" y="30" width="64" height="15" rx="4" fill="#5EEAD4"/>
  <!-- Switch arrow -->
  <path d="M50 47 L50 54" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M47 51 L50 54 L53 51" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Live stack bar (white = currently active) -->
  <rect x="18" y="57" width="64" height="15" rx="4" fill="white"/>
</svg>
