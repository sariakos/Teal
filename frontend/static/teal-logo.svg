<svg width="280" height="120" viewBox="0 0 280 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Teal — deployment platform logo -->
  <!-- Icon background -->
  <rect x="12" y="12" width="96" height="96" rx="16" fill="#0D9488"/>
  <!-- Deploying stack bar (lighter teal = incoming deployment) -->
  <rect x="30" y="39" width="60" height="14" rx="3" fill="#5EEAD4"/>
  <!-- Switch arrow -->
  <path d="M60 55 L60 62" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M57 59 L60 62 L63 59" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Live stack bar (white = currently active) -->
  <rect x="30" y="65" width="60" height="14" rx="3" fill="white"/>
  <!-- Wordmark -->
  <text x="128" y="82" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif" font-size="64" font-weight="500" fill="#0D9488" letter-spacing="-1">teal</text>
</svg>
